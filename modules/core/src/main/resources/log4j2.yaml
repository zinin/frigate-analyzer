Configuration:
  status: warn
  shutdownHook: disable

  Appenders:
    Console:
      name: Console
      target: SYSTEM_OUT
      PatternLayout:
        pattern: "%d{ISO8601} %5p [%t] %c{1.} :%L - %m%n"

  Loggers:
    Root:
      level: ${env:LOG_LEVEL:-info}
      AppenderRef:
        - ref: Console

    Logger:
      - name: ru.zinin
        level: ${env:APP_LOG_LEVEL:-info}
